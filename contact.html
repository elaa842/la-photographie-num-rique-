<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Contact - KAZEF par Loula</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>KAZEF</h1>
        <p>Peintures à l'huile par Loula</p>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="galerie.html">Galerie</a>
            <a href="apropos.html">À propos</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <h2>Contactez-moi</h2>
        
        <form>
            <label for="nom">Votre nom</label>
            <input type="text" id="nom" placeholder="Entrez votre nom" required>

            <label for="email">Votre email</label>
            <input type="email" id="email" placeholder="Entrez votre email" required>

            <label for="tableau">Tableau qui vous intéresse</label>
            <select id="tableau">
                <option value="">Choisissez un tableau</option>
                <option value="Les Ballerines de l’Opéra">Les Ballerines de l’Opéra - 580 TND</option>
                <option value="Jardin Mystique">Jardin Mystique - 720 TND</option>
                <option value="L’Enfant aux Mimosas">L’Enfant aux Mimosas - 480 TND</option>
                <option value="La Parade des Chapeaux">La Parade des Chapeaux - 850 TND</option>
                <option value="Cascade Lunaire">Cascade Lunaire - 650 TND</option>
                <option value="Vers l’Infini">Vers l’Infini - 690 TND</option>
                <option value="Fenêtre sur la Méditerranée">Fenêtre sur la Méditerranée - 620 TND</option>
            </select>

            <label for="message">Votre message</label>
            <textarea id="message" rows="8" placeholder="Décrivez votre projet, posez vos questions ou indiquez si vous souhaitez réserver un tableau..." required></textarea>

            <button type="submit">Envoyer le message</button>
        </form>

        <div style="text-align: center; margin-top: 50px; font-size: 1.1em;">
            <p><strong>Je réponds généralement sous 48 heures.</strong></p>
            <p>Merci pour votre intérêt envers mes créations !</p>
        </div>
    </main>

    <footer>
        <p>© 2026 KAZEF - Peintures à l'huile par Loula • Tunis, Tunisie</p>
    </footer>

</body>
</html>
